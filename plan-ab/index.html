<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>보이스피싱크홀 — 당신의 내성 테스트</title>
  <meta name="description"
        content="순한맛부터 시작해서 지옥맛까지, 당신은 이 싱크홀에서 빠져나올 수 있습니까?" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div id="app">

  <!-- ======================================================
       인트로 화면
       ====================================================== -->
  <section id="screen-intro" class="screen active" role="main" aria-label="인트로">
    <div class="intro-inner">
      <!-- 배경 음파 파형 (SVG) -->
      <svg id="waveform-svg" class="intro-waveform"
           viewBox="0 0 300 60" aria-hidden="true">
      </svg>

      <!-- 타이핑 텍스트 -->
      <p id="intro-typing" class="intro-text" aria-live="polite"></p>

      <p class="intro-sub">
        당신의 내성을 테스트합니다 — 순한맛부터 지옥맛까지
      </p>

      <p class="intro-tap-hint">화면을 탭하여 시작</p>
    </div>

    <!-- 전체 화면 탭 영역 -->
    <button id="btn-intro-tap" class="intro-tap-overlay"
            aria-label="탭하여 시작"></button>
  </section>

  <!-- ======================================================
       시작 화면
       ====================================================== -->
  <section id="screen-start" class="screen" role="main" aria-label="시작">
    <div class="start-inner">
      <!-- 로고 -->
      <div class="start-logo">
        <h1 class="start-logo-main">보이스피싱크홀</h1>
        <p class="start-logo-sub">당신의 내성 테스트</p>
      </div>

      <!-- 맛 단계 프리뷰 -->
      <div class="spice-preview" aria-label="난이도 단계">
        <div class="spice-preview-item">
          <span class="spice-emoji">🌶️</span>
          <span class="spice-level-label">순한맛</span>
        </div>
        <div class="spice-preview-item">
          <span class="spice-emoji">🌶️🌶️</span>
          <span class="spice-level-label">매운맛</span>
        </div>
        <div class="spice-preview-item">
          <span class="spice-emoji">🌶️🌶️🌶️</span>
          <span class="spice-level-label">불맛</span>
        </div>
        <div class="spice-preview-item">
          <span class="spice-emoji">🌶️🌶️🌶️🌶️</span>
          <span class="spice-level-label">지옥맛</span>
        </div>
      </div>

      <p class="start-sub">
        "당신은 이 싱크홀에서<br>빠져나올 수 있습니까?"
      </p>

      <button id="btn-start" class="btn btn-primary btn-pulse"
              aria-label="내성 테스트 시작">
        내성 테스트 시작
      </button>
    </div>
  </section>

  <!-- ======================================================
       싱크홀 스테이지 화면 (4단계 공통 재사용)
       ====================================================== -->
  <section id="screen-stage" class="screen" role="main" aria-label="싱크홀 스테이지">
    <div class="stage-page">

      <!-- 상단 스티키 헤더 -->
      <header class="stage-header">
        <div class="stage-header-row">
          <span id="spice-badge" class="spice-badge">🌶️ 순한맛</span>
          <span id="stage-label" class="stage-label">SINKHOLE 1</span>
          <span id="stage-counter" class="stage-counter">1 / 4</span>
        </div>
        <div class="progress-bar-track" role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-bar" class="progress-bar-fill" style="width: 25%;"></div>
        </div>
      </header>

      <!-- 스테이지 바디 (싱크홀 애니메이션 타겟) -->
      <div class="stage-body" id="stage-body">

        <!-- 오디오 플레이어 -->
        <div class="audio-player">
          <button id="btn-audio-play" class="audio-play-btn"
                  aria-label="음성 재생/일시정지">
            <!-- Play 아이콘 -->
            <svg class="icon-play" width="18" height="18" viewBox="0 0 18 18"
                 fill="white" aria-hidden="true">
              <path d="M4 3.5l11 5.5-11 5.5V3.5z"/>
            </svg>
            <!-- Pause 아이콘 -->
            <svg class="icon-pause" width="18" height="18" viewBox="0 0 18 18"
                 fill="white" aria-hidden="true">
              <rect x="3" y="3" width="4" height="12" rx="1"/>
              <rect x="11" y="3" width="4" height="12" rx="1"/>
            </svg>
          </button>

          <div class="audio-info">
            <span id="audio-label" class="audio-label">음성 재생 후 선택 가능합니다</span>
            <div id="waveform-player" class="waveform-player" aria-hidden="true"></div>
          </div>
        </div>

        <!-- 상황 카드 -->
        <div class="situation-card">
          <span class="card-label">이런 전화가 왔습니다</span>
          <div id="keywords-grid" class="keywords-grid" aria-label="핵심 키워드"></div>
          <p id="situation-text" class="situation-text"></p>
        </div>

        <!-- 선택 버튼 -->
        <div class="choices" role="group" aria-label="선택">
          <button id="btn-a" class="btn btn-sink" disabled
                  aria-label="A — 싱크홀에 빠진다">
            <span class="choice-label choice-label-a">A</span>
            <span id="choice-a-text" class="choice-text">싱크홀에 빠진다</span>
          </button>
          <button id="btn-b" class="btn btn-safe" disabled
                  aria-label="B — 싱크홀을 피한다">
            <span class="choice-label choice-label-b">B</span>
            <span id="choice-b-text" class="choice-text">싱크홀을 피한다</span>
          </button>
        </div>

      </div><!-- /.stage-body -->
    </div><!-- /.stage-page -->

    <!-- 결과 오버레이 -->
    <div id="result-overlay" class="result-overlay" aria-live="assertive">
      <div class="result-overlay-inner">
        <div id="result-icon" class="result-icon">🌀</div>
        <span id="result-type" class="result-type sink">SINKHOLE</span>
        <p id="result-message" class="result-message sink"></p>
        <p id="result-detail" class="result-detail"></p>
        <p id="result-response" class="result-response"></p>
        <p id="result-next-hint" class="result-next-hint"></p>
      </div>
    </div>
  </section>

  <!-- ======================================================
       최종 내성 리포트 (#screen-result)
       ====================================================== -->
  <section id="screen-result" class="screen" role="main" aria-label="최종 내성 리포트">
    <div class="result-page">

      <!-- 헤더 -->
      <div class="result-header">
        <p class="result-header-tag">VOICE PHISHING SINKHOLE</p>
        <h2 class="result-header-title">내성 테스트 완료</h2>
      </div>

      <!-- 면역력 게이지 -->
      <div class="immunity-gauge-wrap">
        <svg class="immunity-gauge-svg" width="160" height="160" viewBox="0 0 160 160"
             aria-label="면역력 게이지" role="img">
          <circle class="gauge-bg" cx="80" cy="80" r="64"/>
          <circle id="gauge-progress" class="gauge-progress" cx="80" cy="80" r="64"/>
          <text class="gauge-center" x="80" y="72">
            <tspan id="score-num" class="gauge-score-num" x="80" dy="0">0</tspan>
            <tspan class="gauge-score-denom"> / 4</tspan>
          </text>
          <text class="gauge-center gauge-score-label" x="80" y="100">싱크홀 탈출</text>
        </svg>
        <p id="result-msg-text" class="result-msg-text"></p>
      </div>

      <hr class="divider" />

      <!-- 단계별 결과 테이블 -->
      <div>
        <p class="section-label" style="margin-bottom: 8px;">단계별 결과</p>
        <div id="stage-results-table" class="stage-results-table"
             aria-label="단계별 결과 테이블">
          <!-- JS로 렌더링 -->
        </div>
      </div>

      <hr class="divider" />

      <!-- 교육 카드 -->
      <div>
        <p class="section-label" style="margin-bottom: 8px;">빠진 싱크홀 복습</p>
        <div id="edu-cards" class="edu-cards" aria-label="교육 카드"></div>
      </div>

      <hr class="divider" />

      <!-- 액션 그리드 -->
      <div class="action-grid">
        <button id="btn-share-kakao" class="btn btn-action">
          <span class="btn-action-icon">💬</span>
          카카오 공유
        </button>
        <button id="btn-share-url" class="btn btn-action">
          <span class="btn-action-icon">🔗</span>
          링크 복사
        </button>
        <button id="btn-apply" class="btn btn-action" data-url="#">
          <span class="btn-action-icon">🎁</span>
          경품 응모
        </button>
        <button id="btn-retry" class="btn btn-action">
          <span class="btn-action-icon">🔄</span>
          다시 도전
        </button>
      </div>

    </div><!-- /.result-page -->
  </section>

  <!-- ======================================================
       글로벌 공통 요소
       ====================================================== -->
  <!-- 토스트 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 플래시 오버레이 -->
  <div id="flash-overlay" class="flash-overlay" aria-hidden="true"></div>

  <!-- 파티클 컨테이너 -->
  <div id="particle-container" class="particle-container" aria-hidden="true"></div>

  <!-- 가로 모드 경고 -->
  <div class="landscape-guard" aria-hidden="true">
    <span style="font-size: 2rem;">📱</span>
    <p class="landscape-guard-text">세로 모드로 회전해 주세요</p>
  </div>

</div><!-- /#app -->

<!-- JS 모듈 로드 순서 -->
<script src="js/stages.js"></script>
<script src="js/utils.js"></script>
<script src="js/AudioEngine.js"></script>
<script src="js/SinkholeEffect.js"></script>
<script src="js/ScoreTracker.js"></script>
<script src="js/StageManager.js"></script>
<script src="js/main.js"></script>
</body>
</html>
