<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>보이스피싱크홀 — 당신은 피할 수 있습니까?</title>
    <meta name="description" content="금융감독원 보이스피싱 예방 캠페인. 실제 수법을 직접 체험하고 판단하세요." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- ============================================================
           INTRO 1  (#screen-intro1)
           첫 번째 인트로 화면
      ============================================================ -->
      <section id="screen-intro1" class="screen active" aria-label="인트로 1">
        <picture>
          <source media="(max-width: 768px)" srcset="image/intro1/mo.png" />
          <img src="image/intro1/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <!-- 인터랙션 영역 -->
        <div class="screen-overlay">
          <button class="tap-full" id="btn-intro1-next" aria-label="다음으로">
            <span class="sr-only">화면을 터치하면 다음으로 이동합니다</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           INTRO 2  (#screen-intro2)
           두 번째 인트로 화면
      ============================================================ -->
      <section id="screen-intro2" class="screen" aria-label="인트로 2">
        <picture>
          <source media="(max-width: 768px)" srcset="image/intro2/mo.png" />
          <img src="image/intro2/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="tap-full" id="btn-intro2-next" aria-label="다음으로">
            <span class="sr-only">화면을 터치하면 다음으로 이동합니다</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           MAIN PAGE  (#screen-main)
           메인 시작 화면
      ============================================================ -->
      <section id="screen-main" class="screen" aria-label="메인 화면">
        <picture>
          <source media="(max-width: 768px)" srcset="image/main/mo.png" />
          <img src="image/main/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <!-- 시작 버튼 — 이미지 위 투명 오버레이 -->
          <button class="btn-overlay" id="btn-main-start" aria-label="도전 시작하기">
            <span class="sr-only">도전 시작하기</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 1  (#screen-step1)
           1단계 게임 화면
      ============================================================ -->
      <section id="screen-step1" class="screen" aria-label="Step 1">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step1/mo.png" />
          <img src="image/step1/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <!-- 선택 버튼 A -->
          <button class="btn-overlay btn-step1-a" id="btn-step1-a" aria-label="선택 A">
            <span class="sr-only">선택 A</span>
          </button>
          <!-- 선택 버튼 B -->
          <button class="btn-overlay btn-step1-b" id="btn-step1-b" aria-label="선택 B">
            <span class="sr-only">선택 B</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 1 — SUCCESS  (#screen-step1-suc)
      ============================================================ -->
      <section id="screen-step1-suc" class="screen" aria-label="Step 1 성공">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step1/success/mo.png" />
          <img src="image/step1/success/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-next" id="btn-step1-suc-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 1 — FAIL  (#screen-step1-fail)
      ============================================================ -->
      <section id="screen-step1-fail" class="screen" aria-label="Step 1 실패">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step1/fail/mo.png" />
          <img src="image/step1/fail/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-next" id="btn-step1-fail-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 2  (#screen-step2)
           2단계 게임 화면
      ============================================================ -->
      <section id="screen-step2" class="screen" aria-label="Step 2">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step2/mo.png" />
          <img src="image/step2/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-step2-a" id="btn-step2-a" aria-label="선택 A">
            <span class="sr-only">선택 A</span>
          </button>
          <button class="btn-overlay btn-step2-b" id="btn-step2-b" aria-label="선택 B">
            <span class="sr-only">선택 B</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 2 — SUCCESS  (#screen-step2-suc)
      ============================================================ -->
      <section id="screen-step2-suc" class="screen" aria-label="Step 2 성공">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step2/success/mo.png" />
          <img src="image/step2/success/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-next" id="btn-step2-suc-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 2 — FAIL  (#screen-step2-fail)
      ============================================================ -->
      <section id="screen-step2-fail" class="screen" aria-label="Step 2 실패">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step2/fail/mo.png" />
          <img src="image/step2/fail/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-next" id="btn-step2-fail-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 3  (#screen-step3)
           3단계 게임 화면
      ============================================================ -->
      <section id="screen-step3" class="screen" aria-label="Step 3">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step3/mo.png" />
          <img src="image/step3/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-step3-a" id="btn-step3-a" aria-label="선택 A">
            <span class="sr-only">선택 A</span>
          </button>
          <button class="btn-overlay btn-step3-b" id="btn-step3-b" aria-label="선택 B">
            <span class="sr-only">선택 B</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 3 — SUCCESS  (#screen-step3-suc)
      ============================================================ -->
      <section id="screen-step3-suc" class="screen" aria-label="Step 3 성공">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step3/success/mo.png" />
          <img src="image/step3/success/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-next" id="btn-step3-suc-next" aria-label="결과 보기">
            <span class="sr-only">결과 보기</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 3 — FAIL  (#screen-step3-fail)
      ============================================================ -->
      <section id="screen-step3-fail" class="screen" aria-label="Step 3 실패">
        <picture>
          <source media="(max-width: 768px)" srcset="image/step3/fail/mo.png" />
          <img src="image/step3/fail/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <button class="btn-overlay btn-next" id="btn-step3-fail-next" aria-label="결과 보기">
            <span class="sr-only">결과 보기</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           RESULT  (#screen-result)
           최종 결과 화면
      ============================================================ -->
      <section id="screen-result" class="screen" aria-label="최종 결과">
        <picture>
          <source media="(max-width: 768px)" srcset="image/result/mo.png" />
          <img src="image/result/pc.png" alt="" class="screen-bg" draggable="false" />
        </picture>
        <div class="screen-overlay">
          <!-- 재도전 버튼 -->
          <button class="btn-overlay btn-retry" id="btn-retry" aria-label="다시 도전하기">
            <span class="sr-only">다시 도전하기</span>
          </button>
        </div>
      </section>


      <!-- 전역 공통 -->
      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
      <span class="sr-only" id="sr-announce" aria-live="assertive"></span>

    </div><!-- /#app -->

    <script src="js/main.js"></script>
  </body>
</html>
