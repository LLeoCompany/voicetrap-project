<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>보이스피싱크홀 — 당신은 피할 수 있습니까?</title>
    <meta name="description" content="금융감독원 보이스피싱 예방 캠페인. 실제 수법을 직접 체험하고 판단하세요." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- ============================================================
           INTRO 1  (#screen-intro1)
           전환: 탭 전체 → #screen-intro2
      ============================================================ -->
      <section id="screen-intro1" class="screen active">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/intro1/mo.png" />
            <img src="image/intro1/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <!-- 전체 탭 -->
          <button class="btn-tap-all" id="btn-intro1-next" aria-label="다음으로">
            <span class="sr-only">화면을 터치하면 다음으로 이동합니다</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           INTRO 2  (#screen-intro2)
           전환: 탭 전체 → #screen-main
      ============================================================ -->
      <section id="screen-intro2" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/intro2/mo.png" />
            <img src="image/intro2/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-tap-all" id="btn-intro2-next" aria-label="다음으로">
            <span class="sr-only">화면을 터치하면 다음으로 이동합니다</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           MAIN PAGE  (#screen-main)
           전환: 시작 버튼 → #screen-step1
      ============================================================ -->
      <section id="screen-main" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/main/mo.png" />
            <img src="image/main/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <!-- 시작 버튼 — 이미지 위 투명 오버레이, 위치는 CSS에서 지정 -->
          <button class="btn-pos" id="btn-main-start" aria-label="도전 시작하기">
            <span class="sr-only">도전 시작하기</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 1  (#screen-step1)
           선택 A → #screen-step1-suc
           선택 B → #screen-step1-fail
      ============================================================ -->
      <section id="screen-step1" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step1/mo.png" />
            <img src="image/step1/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-step1-a" id="btn-step1-a" aria-label="선택 A">
            <span class="sr-only">선택 A</span>
          </button>
          <button class="btn-pos btn-step1-b" id="btn-step1-b" aria-label="선택 B">
            <span class="sr-only">선택 B</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 1 — SUCCESS  (#screen-step1-suc)
           전환: 다음 버튼 → #screen-step2
      ============================================================ -->
      <section id="screen-step1-suc" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step1/success/mo.png" />
            <img src="image/step1/success/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-next" id="btn-step1-suc-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 1 — FAIL  (#screen-step1-fail)
           전환: 다음 버튼 → #screen-step2
      ============================================================ -->
      <section id="screen-step1-fail" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step1/fail/mo.png" />
            <img src="image/step1/fail/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-next" id="btn-step1-fail-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 2  (#screen-step2)
           선택 A → #screen-step2-suc
           선택 B → #screen-step2-fail
      ============================================================ -->
      <section id="screen-step2" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step2/mo.png" />
            <img src="image/step2/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-step2-a" id="btn-step2-a" aria-label="선택 A">
            <span class="sr-only">선택 A</span>
          </button>
          <button class="btn-pos btn-step2-b" id="btn-step2-b" aria-label="선택 B">
            <span class="sr-only">선택 B</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 2 — SUCCESS  (#screen-step2-suc)
           전환: 다음 버튼 → #screen-step3
      ============================================================ -->
      <section id="screen-step2-suc" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step2/success/mo.png" />
            <img src="image/step2/success/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-next" id="btn-step2-suc-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 2 — FAIL  (#screen-step2-fail)
           전환: 다음 버튼 → #screen-step3
      ============================================================ -->
      <section id="screen-step2-fail" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step2/fail/mo.png" />
            <img src="image/step2/fail/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-next" id="btn-step2-fail-next" aria-label="다음 단계">
            <span class="sr-only">다음 단계로</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 3  (#screen-step3)
           선택 A → #screen-step3-suc
           선택 B → #screen-step3-fail
      ============================================================ -->
      <section id="screen-step3" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step3/mo.png" />
            <img src="image/step3/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-step3-a" id="btn-step3-a" aria-label="선택 A">
            <span class="sr-only">선택 A</span>
          </button>
          <button class="btn-pos btn-step3-b" id="btn-step3-b" aria-label="선택 B">
            <span class="sr-only">선택 B</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 3 — SUCCESS  (#screen-step3-suc)
           전환: 다음 버튼 → #screen-result
      ============================================================ -->
      <section id="screen-step3-suc" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step3/success/mo.png" />
            <img src="image/step3/success/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-next" id="btn-step3-suc-next" aria-label="결과 보기">
            <span class="sr-only">결과 보기</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           STEP 3 — FAIL  (#screen-step3-fail)
           전환: 다음 버튼 → #screen-result
      ============================================================ -->
      <section id="screen-step3-fail" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step3/fail/mo.png" />
            <img src="image/step3/fail/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-next" id="btn-step3-fail-next" aria-label="결과 보기">
            <span class="sr-only">결과 보기</span>
          </button>
        </div>
      </section>


      <!-- ============================================================
           RESULT  (#screen-result)
           전환: 재도전 버튼 → #screen-intro1
      ============================================================ -->
      <section id="screen-result" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/result/mo.png" />
            <img src="image/result/pc.png" alt="" class="page-img" draggable="false" />
          </picture>
          <button class="btn-pos btn-retry" id="btn-retry" aria-label="다시 도전하기">
            <span class="sr-only">다시 도전하기</span>
          </button>
        </div>
      </section>


      <!-- 전역 공통 -->
      <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>
      <span class="sr-only" id="sr-announce" aria-live="assertive"></span>

    </div><!-- /#app -->

    <script src="js/main.js"></script>
  </body>
</html>
