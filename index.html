<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>보이스피싱크홀 — 당신은 피할 수 있습니까?</title>
    <meta
      name="description"
      content="금융감독원 보이스피싱 예방 캠페인. 실제 수법을 직접 체험하고 판단하세요."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Gowun+Dodum&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- ============================================================
           INTRO 1  (#screen-intro1)
           전환: 탭 전체 → #screen-intro2
      ============================================================ -->
      <section id="screen-intro1" class="screen active">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/intro1/mo.png" />
            <img
              src="image/intro1/pc.png"
              alt=""
              class="page-img"
              draggable="false"
            />
          </picture>
          <button
            class="btn-tap-all"
            id="btn-intro1-next"
            aria-label="다음으로"
          >
            <span class="sr-only">화면을 터치하면 다음으로 이동합니다</span>
          </button>
          <!-- 글리치 텍스트 오버레이 (PC + 모바일) -->
          <div id="intro1-glitch" aria-hidden="true">
            <img
              class="glitch-frame glitch-pc"
              src="image/intro1/item/공개 복사1.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-pc"
              src="image/intro1/item/공개 복사2.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-pc"
              src="image/intro1/item/공개 복사3.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-pc"
              src="image/intro1/item/공개 복사4.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-pc"
              src="image/intro1/item/공개 복사5.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-mo"
              src="image/intro1/item-mobile/헤드라인 효과 1초.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-mo"
              src="image/intro1/item-mobile/헤드라인 효과 2번째 0,.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-mo"
              src="image/intro1/item-mobile/헤드라인 효과 3번째 0.1초.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-mo"
              src="image/intro1/item-mobile/헤드라인 효과 4번째 0.1초.png"
              alt=""
              draggable="false"
            />
            <img
              class="glitch-frame glitch-mo"
              src="image/intro1/item-mobile/헤드라인 효과 5번째 2.png"
              alt=""
              draggable="false"
            />
          </div>
        </div>
      </section>

      <!-- ============================================================
           INTRO 2  (#screen-intro2)
           전환: 탭 전체 → #screen-main
      ============================================================ -->
      <section id="screen-intro2" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/intro2/mo.png" />
            <img
              src="image/intro2/pc.png"
              alt=""
              class="page-img"
              draggable="false"
            />
          </picture>
          <button
            class="btn-tap-all"
            id="btn-intro2-next"
            aria-label="다음으로"
          >
            <span class="sr-only">화면을 터치하면 다음으로 이동합니다</span>
          </button>
        </div>
      </section>

      <!-- ============================================================
           MAIN PAGE  (#screen-main)
           전환: 시작 버튼 → #screen-step1
      ============================================================ -->
      <section id="screen-main" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/main/mo.png" />
            <img
              src="image/main/item/인트로3배경이미지.jpg"
              alt=""
              class="page-img"
              draggable="false"
            />
          </picture>

          <!-- PC 전용: 텍스트 오버레이 (1920×2160) -->
          <img
            class="main-layer main-text-layer"
            src="image/main/item/보이스피싱 이벤트랜딩텍스트이미지.인트로3.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- PC 전용: 경품 장식 (675×197) -->
          <img
            class="main-layer main-prize-deco"
            src="image/main/item/경품 장식.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- PC 전용: 경품 박스 배경 (978×827) -->
          <img
            class="main-layer main-prize-box"
            src="image/main/item/인트로3 경품배경 박스.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- PC 전용: 경품 1~4 (각 757×549) — 2×2 배치 -->
          <img class="main-layer main-prize main-prize-1" src="image/main/item/경품 /1.png" alt="" aria-hidden="true" draggable="false" />
          <img class="main-layer main-prize main-prize-2" src="image/main/item/경품 /2.png" alt="" aria-hidden="true" draggable="false" />
          <img class="main-layer main-prize main-prize-3" src="image/main/item/경품 /3.png" alt="" aria-hidden="true" draggable="false" />
          <img class="main-layer main-prize main-prize-4" src="image/main/item/경품 /4.png" alt="" aria-hidden="true" draggable="false" />

          <!-- PC 전용: 입장하기 버튼 이미지 (1093×473) -->
          <img
            class="main-layer main-btn-layer"
            src="image/main/item/이벤트입장하기버튼.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <button
            class="btn-pos"
            id="btn-main-start"
            aria-label="도전 시작하기"
          >
            <span class="sr-only">도전 시작하기</span>
          </button>
        </div>
        <button class="scroll-hint" aria-label="아래로 스크롤">
          <div class="scroll-hint-arrow"></div>
          <div class="scroll-hint-arrow"></div>
        </button>
      </section>

      <!-- ============================================================
           STEP 1  (#screen-step1)
           선택 A (#btn-step1-a) → #screen-step1-suc
           선택 B (#btn-step1-b) → #screen-step1-fail
      ============================================================ -->
      <section id="screen-step1" class="screen">
        <div class="page-canvas">
          <picture>
            <source media="(max-width: 768px)" srcset="image/step1/mo.png" />
            <img
              src="image/step1/pc.png"
              alt=""
              class="page-img"
              draggable="false"
            />
          </picture>

          <!-- 음파 오버레이 — 폰 화면 위 -->
          <div class="phone-wave" id="wave-step1">
            <button
              class="wave-play-btn"
              id="btn-step1-play"
              aria-label="음성 재생/정지"
              aria-pressed="false"
            >
              <img
                src="image/item-image/play-btn.png"
                alt=""
                class="play-btn-img"
                draggable="false"
              />
            </button>
          </div>

          <!-- 빨간 글자 티커 오버레이 -->
        <div class="ticker-overlay" aria-hidden="true">
            <div class="ticker-track">
              <img class="ticker-img" src="image/step1/스테이지 자막.png" alt="" draggable="false" />
              <img class="ticker-img" src="image/step1/스테이지 자막.png" alt="" draggable="false" />
            </div>
          </div>

          <!-- 선택 버튼 -->
          <button
            class="btn-pos btn-step1-a"
            id="btn-step1-a"
            aria-label="수사관의 안내에 따라 절차를 진행한다"
          >
            <span class="sr-only">수사관의 안내에 따라 절차를 진행한다</span>
          </button>
          <button
            class="btn-pos btn-step1-b"
            id="btn-step1-b"
            aria-label="전화를 끊고 공식 기관 번호로 직접 확인한다"
          >
            <span class="sr-only"
              >전화를 끊고 공식 기관 번호로 직접 확인한다</span
            >
          </button>
        </div>
      </section>

          />
     
          <img
            class="suc-mo-layer suc-mo-whitebg"
            src="image/step1/success/item-mobile/스마트폰 성공 하얀배경 복사 (1).png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="suc-mo-layer suc-mo-img1"
            src="image/step1/success/item-mobile/1.png"

          />

          <img

      <!-- ============================================================

      ============================================================ -->

            src="image/result/mobile-item/수고 유튜브경품 박스.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- ── 모바일 전용: 비디오 썸네일 (190×396) ── -->
          <img
            class="result-layer result-mo-thumbnail"
            src="image/result/mobile-item/모바일썸네일.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- ── 모바일 전용: 선물 장식 / 경품 배경 / 경품 아이콘 ── -->
          <img
            class="result-layer result-gift-deco"
            src="image/result/mobile-item/선물장식.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <!-- ── 모바일 전용: 경품 1~4 ── -->
          <img
            class="result-layer result-prize-mo result-prize-mo-1"
            src="image/result/mobile-item/경품 /1.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-mo result-prize-mo-2"
            src="image/result/mobile-item/경품 /2.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-mo result-prize-mo-3"
            src="image/result/mobile-item/경품 /3.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-mo result-prize-mo-4"
            src="image/result/mobile-item/경품 /4.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- ── PC 전용: 경품 장식 / 경품 1~4 ── -->
          <img
            class="result-layer result-prize-deco-pc"
            src="image/result/pc-item/경품 장식.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-pc result-prize-pc-1"
            src="image/result/pc-item/경품 /1.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-pc result-prize-pc-2"
            src="image/result/pc-item/경품 /2.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-pc result-prize-pc-3"
            src="image/result/pc-item/경품 /3.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />
          <img
            class="result-layer result-prize-pc result-prize-pc-4"
            src="image/result/pc-item/경품 /4.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- 유튜브 재생 아이콘 — "보이스피싱 예방 홍보영상" 제목 왼쪽 -->
          <img
            class="result-layer result-yt-title-icon"
            src="image/result/mobile-item/유큐브버튼.png"
            alt=""
            aria-hidden="true"
            draggable="false"
          />

          <!-- 재도전 버튼 -->
          <button
            class="btn-pos btn-retry"
            id="btn-retry"
            aria-label="다시 도전하기"
          >
            <span class="sr-only">다시 도전하기</span>
          </button>

          <!-- 홍보영상 재생 버튼 3개 -->
          <button
            class="btn-pos btn-result-video"
            id="btn-video-1"
            aria-label="홍보영상 1 재생"
          >
            <img
              src="image/result/mobile-item/유큐브버튼.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
          </button>
          <button
            class="btn-pos btn-result-video"
            id="btn-video-2"
            aria-label="홍보영상 2 재생"
          >
            <img
              src="image/result/mobile-item/유큐브버튼.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
          </button>
          <button
            class="btn-pos btn-result-video"
            id="btn-video-3"
            aria-label="홍보영상 3 재생"
          >
            <img
              src="image/result/mobile-item/유큐브버튼.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
          </button>

          <!-- ── 모바일 전용: 등록·공유 버튼 그룹 (combined 이미지 + 투명 버튼 묶음) ── -->
          <div class="result-layer result-btn-group result-btn-group-mo">
            <img
              class="result-btn-img"
              src="image/result/mobile-item/등록:공유버튼.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
            <!-- 보이스피싱크홀 공유하기 -->
            <button
              class="btn-pos"
              id="btn-result-share"
              aria-label="보이스피싱크홀 공유하기"
            >
              <span class="sr-only">보이스피싱크홀 공유하기</span>
            </button>
            <!-- 지금 등록하고 자동 응모하기 -->
            <button
              class="btn-pos"
              id="btn-result-register"
              aria-label="지금 등록하고 자동 응모하기"
            >
              <span class="sr-only">지금 등록하고 자동 응모하기</span>
            </button>
          </div>

          <!-- ── PC 전용: 경품 응모하기 버튼 (1133×380) ── -->
          <div class="result-layer result-btn-group result-register-group-pc">
            <img
              class="result-btn-img"
              src="image/result/pc-item/경품응모하기버튼 복사.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
            <button
              class="btn-pos"
              id="btn-result-register-pc"
              aria-label="지금 등록하고 자동 응모하기"
            >
              <span class="sr-only">지금 등록하고 자동 응모하기</span>
            </button>
          </div>

          <!-- ── PC 전용: 보이스피싱크홀 공유하기 버튼 (1133×384) ── -->
          <div class="result-layer result-btn-group result-share-group-pc">
            <img
              class="result-btn-img"
              src="image/result/pc-item/공유하기 복사.png"
              alt=""
              aria-hidden="true"
              draggable="false"
            />
            <button
              class="btn-pos"
              id="btn-result-share-pc"
              aria-label="보이스피싱크홀 공유하기"
            >
              <span class="sr-only">보이스피싱크홀 공유하기</span>
            </button>
          </div>
        </div>
        <button class="scroll-hint" aria-label="아래로 스크롤">
          <div class="scroll-hint-arrow"></div>
          <div class="scroll-hint-arrow"></div>
        </button>
      </section>

      <!-- ============================================================
           등록 팝업
      ============================================================ -->
      <div
        class="popup-overlay"
        id="popup-register"
        role="dialog"
        aria-modal="true"
        aria-label="응모 등록"
      >
        <div class="popup-box">
          <button class="popup-close" id="btn-popup-close" aria-label="닫기">
            ✕
          </button>
          <h2 class="popup-title">지금 등록하고 자동 응모!</h2>
          <p class="popup-desc">
            이름과 전화번호를 입력하시면<br />자동으로 경품 응모가 완료됩니다.
          </p>
          <form class="popup-form" id="form-register" novalidate>
            <label class="popup-label" for="input-name">이름</label>
            <input
              class="popup-input"
              id="input-name"
              type="text"
              placeholder="이름을 입력하세요"
              autocomplete="name"
            />
            <label class="popup-label" for="input-phone">전화번호</label>
            <input
              class="popup-input"
              id="input-phone"
              type="tel"
              placeholder="010-0000-0000"
              autocomplete="tel"
              inputmode="numeric"
            />
            <button class="popup-submit" type="submit">응모 완료</button>
          </form>
        </div>
      </div>

      <!-- 전역 공통 -->
      <div
        class="toast"
        id="toast"
        role="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>
      <span class="sr-only" id="sr-announce" aria-live="assertive"></span>
    </div>
    <!-- /#app -->

    <script src="js/main.js"></script>
  </body>
</html>
